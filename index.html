<!DOCTYPE html>

<html>

<head>

<title>Mon livre Patagonie</title>

<style>

body { font-family: sans-serif; text-align: center; background: #111; color: white; }

.page { margin-top: 50px; }
.container {
  width: 60%;
  margin: 0 auto;
  position: relative;
}

img, video {
  width: 100%;
  display: block;
  border-radius: 10px;
}

video {
  display: none;
}
</style>

</head>

<body>



<h1>Patagonie</h1>



<div class="page">

<img id="photo" src="Tango.jpg" onclick="playVideo()">



<video id="video" controls>

<source src="Tango.mp4" type="video/mp4">

</video>

</div>



<script>

function playVideo() {

document.getElementById("photo").style.display = "none";

let video = document.getElementById("video");

video.style.display = "block";

video.play();

}

</script>
